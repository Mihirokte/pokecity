name: Twitter Scraper

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/twitter-scraper/requirements.txt

      - name: Write cookies
        env:
          TWITTER_CT0: ${{ secrets.TWITTER_CT0 }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
        run: |
          echo "{\"ct0\": \"$TWITTER_CT0\", \"auth_token\": \"$TWITTER_AUTH_TOKEN\"}" \
            > scripts/twitter-scraper/cookies.json

      - name: Run scraper
        run: python scripts/twitter-scraper/scraper.py scrape

      - name: Commit output.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/twitter-scraper/output.json
          git diff --staged --quiet || git commit -m "chore: update curated tweets [skip ci]"
          git push
